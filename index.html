<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Balaji Portfolio</title>

    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- Navbar -->
    <header>
        <div class="logo">Balaji</div>

        <div class="menu-btn" id="menu-btn">☰</div>

        <nav class="navbar" id="navbar">
            <a href="#home">Home</a>
            <a href="#services">Services</a>
            <a href="#skills">Skills</a>
            <a href="#projects">Projects</a>
            <a href="#contact">Contact</a>
        </nav>
    </header>

    <!-- Hero -->
    <section class="hero" id="home">
        <img src="profile.jpg" class="profile-img" alt="Balaji">

        <h1>Hello, I'm <span>Balaji</span></h1>

        <h2 id="typing"></h2>

        <a href="Balaji_Resume.pdf" download class="btn">
            Download Resume
        </a>
    </section>

    <!-- Skills -->
    <section id="skills">
        <h2>Skills</h2>
    </section>

    <!-- Services -->
    <section id="services">
        <h2>Services</h2>
    </section>

    <!-- Projects -->
    <section id="projects">
        <h2>Projects</h2>
    </section>

    <!-- Contact -->
    <section id="contact">

        <form id="contactForm">

            <input type="text" id="name" placeholder="Name">

            <input type="email" id="email" placeholder="Email">

            <textarea id="message"></textarea>

            <button type="submit">Send</button>

        </form>

    </section>

    <!-- Social Links -->
    <div class="socials">
        <a href="https://github.com/yourusername">GitHub</a>
        <a href="https://linkedin.com/in/yourprofile">LinkedIn</a>
    </div>

    <button id="theme-btn">🌙</button>

    <script src="script.js"></script>

</body>
</html>
